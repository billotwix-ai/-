<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Hyper Server | لوحة التحكم</title>
    <style>
        :root { --primary: #00ff41; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .dashboard { background: var(--panel); border: 1px solid var(--primary); border-radius: 10px; padding: 25px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-size: 24px; margin-bottom: 10px; border-bottom: 1px solid var(--primary); padding-bottom: 10px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat { background: #000; padding: 10px; border-radius: 5px; border-right: 3px solid var(--primary); }
        .stat label { display: block; font-size: 10px; color: #888; text-transform: uppercase; }
        .stat span { font-size: 14px; font-weight: bold; }
        .terminal { background: black; color: var(--primary); padding: 15px; border-radius: 5px; height: 150px; overflow-y: auto; font-size: 12px; line-height: 1.5; margin-bottom: 20px; border: 1px solid #333; }
        .btn { display: block; width: 100%; background: var(--primary); color: black; text-align: center; padding: 12px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00cc33; box-shadow: 0 0 15px var(--primary); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>TITAN HYPER CLOUD <span class="blink">_</span></h1>
        <div class="status-grid">
            <div class="stat"><label>Server Status</label><span style="color:var(--primary)">ACTIVE (ONLINE)</span></div>
            <div class="stat"><label>Uptime</label><span>99.9% 24/7</span></div>
            <div class="stat"><label>Location</label><span>TIMOKTEN, DZ</span></div>
            <div class="stat"><label>Engine</label><span>BYPASS OB53 v4.0</span></div>
        </div>
        <div class="terminal" id="logs">
            [SYS] Booting Titan Server Engine...<br>
            [SYS] Connection established with Bot-Hosting.net<br>
            [INFO] Path Signature: /var/mobile/Containers/...<br>
            [READY] Waiting for user input via Telegram...<br>
        </div>
        <a href="https://t.me/8617254929" class="btn">إدارة البوت عبر تلجرام</a>
    </div>
</body>
</html>
